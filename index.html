<html lang="en">
<head>
<meta charset="UTF-8">

<title>✿ 10 ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;700;800;900&family=Pacifico&family=Space+Mono:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
body{min-height:100dvh;position:relative;transition:background 0.7s;}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

#scene{
  width:100vw;height:100dvh;position:relative;
  display:flex;align-items:center;justify-content:center;z-index:1;
}

#card{
  position:relative;z-index:10;
  width:min(390px,92vw);max-height:94dvh;overflow:hidden;
  transition:border-radius 0.6s,box-shadow 0.6s,border-color 0.6s,background 0.6s,transform 0.5s cubic-bezier(.34,1.4,.64,1);
}

#stripe{height:8px;background-size:300%;animation:stripeMove 2s linear infinite;}
@keyframes stripeMove{0%{background-position:0%}100%{background-position:300%}}

#inner{padding:1.2rem 1.4rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.8rem;}

#level{
  align-self:flex-start;font-size:10px;font-weight:900;letter-spacing:2.5px;
  padding:4px 14px;border-radius:30px;text-transform:uppercase;
  transition:background 0.5s,color 0.5s,border-color 0.5s;
}

#gif-zone{position:relative;width:100%;display:flex;justify-content:center;}
#gif-frame{
  flex-shrink:0;overflow:hidden;
  width:min(210px,58vw);height:min(210px,58vw);
  transition:border-radius 0.6s,border-color 0.6s,box-shadow 0.6s;
}
#mgif{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.38s;}
#mgif.out{opacity:0;}

.stk{
  position:absolute;font-size:clamp(18px,5vw,24px);
  animation:bob 3s ease-in-out infinite;pointer-events:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,0.15));
}
.stk.tl{top:-13px;left:calc(50% - min(105px,29vw) - 16px);animation-delay:0s;}
.stk.tr{top:-13px;right:calc(50% - min(105px,29vw) - 16px);animation-delay:0.8s;}
.stk.bl{bottom:-13px;left:calc(50% - min(105px,29vw) - 16px);animation-delay:1.6s;}
.stk.br{bottom:-13px;right:calc(50% - min(105px,29vw) - 16px);animation-delay:2.4s;}
@keyframes bob{
  0%,100%{transform:translateY(0) rotate(-8deg) scale(1);}
  50%{transform:translateY(-9px) rotate(8deg) scale(1.18);}
}

#cipher-box{
  width:100%;border-radius:18px;padding:1rem 1.2rem;min-height:88px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.35s,transform 0.35s,background 0.5s,border-color 0.5s;
  border:1.5px solid;position:relative;overflow:hidden;
}
#cipher-box.out{opacity:0;transform:translateY(6px);}
#cipher-text{line-height:1.9;text-align:center;letter-spacing:0.01em;transition:color 0.5s;}

#progress-wrap{width:100%;display:flex;flex-direction:column;gap:5px;align-items:center;}
#prog-bar-bg{width:100%;height:5px;border-radius:4px;overflow:hidden;}
#prog-bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.34,1.2,.64,1),background 0.5s;}
#prog-label{font-size:9px;font-weight:900;letter-spacing:2px;transition:color 0.5s;opacity:0.7;}

#btn{
  border:none;border-radius:50px;padding:0.85rem 2.6rem;
  font-size:1rem;font-weight:900;letter-spacing:1.5px;cursor:pointer;
  transition:background 0.5s,box-shadow 0.5s,color 0.5s,border-radius 0.5s,transform 0.15s;
  position:relative;overflow:hidden;touch-action:manipulation;
}
#btn:active{transform:scale(0.92)!important;}
#btn::before{
  content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:rgba(255,255,255,0.22);transform:skewX(-20deg);
  animation:shim 2.2s infinite;
}
@keyframes shim{0%{left:-70%}100%{left:130%}}

.spk{position:fixed;pointer-events:none;z-index:999;animation:spkOut 0.75s ease-out forwards;}
@keyframes spkOut{
  0%{transform:translate(0,0) scale(1.2);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}

.conf{position:fixed;pointer-events:none;z-index:998;animation:confFall linear forwards;}
@keyframes confFall{
  0%{transform:translateY(-10px) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(105vh) rotate(800deg) scale(0.5);opacity:0;}
}

#portal{
  position:fixed;z-index:500;pointer-events:none;
  border-radius:50%;width:100px;height:100px;
  transform:scale(0);opacity:0;
}
#portal.active{animation:portalIn 0.55s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes portalIn{
  0%{transform:scale(0);opacity:0.95;}
  65%{transform:scale(4);opacity:0.9;}
  100%{transform:scale(8);opacity:0;}
}

#level-banner{
  position:fixed;top:0;left:0;right:0;z-index:400;
  display:flex;align-items:center;justify-content:center;
  padding:12px;font-size:12px;font-weight:900;letter-spacing:3px;
  transform:translateY(-100%);pointer-events:none;
  transition:transform 0.45s cubic-bezier(.34,1.4,.64,1);
  font-family:'Nunito',sans-serif;
}
#level-banner.show{transform:translateY(0);}

#corner-tl,#corner-tr,#corner-bl,#corner-br{
  position:fixed;font-size:26px;pointer-events:none;z-index:2;
  animation:cornerPulse 3s ease-in-out infinite;transition:opacity 0.5s;
}
#corner-tl{top:14px;left:14px;}
#corner-tr{top:14px;right:14px;animation-delay:0.75s;}
#corner-bl{bottom:14px;left:14px;animation-delay:1.5s;}
#corner-br{bottom:14px;right:14px;animation-delay:2.25s;}
@keyframes cornerPulse{
  0%,100%{transform:scale(1) rotate(0deg);}
  50%{transform:scale(1.25) rotate(12deg);}
}

@media(max-height:650px){
  #inner{gap:0.55rem;padding:0.9rem 1.1rem 1.1rem;}
  #gif-frame{width:min(160px,48vw);height:min(160px,48vw);}
  #cipher-box{min-height:70px;}
  #cipher-text{font-size:0.82rem;line-height:1.7;}
  #btn{padding:0.7rem 2rem;font-size:0.9rem;}
}
</style>
</head>

// ── CANVAS ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let activeTheme = THEMES[0];

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

class Particle {
  constructor(t){
    this.x = Math.random()*canvas.width;
    this.y = canvas.height + 20 + Math.random()*canvas.height;
    this.size = 5+Math.random()*12;
    this.speed = 0.5+Math.random()*1.2;
    this.col = t.particleCols[Math.floor(Math.random()*t.particleCols.length)];
    this.dx = (Math.random()-0.5)*0.7;
    this.rot = Math.random()*360;
    this.rotS = (Math.random()-0.5)*2;
    this.life = 0;
    this.maxLife = 280+Math.random()*220;
    this.maxOp = 0.12+Math.random()*0.15;
    this.op = 0;
    this.shape = Math.random()>0.45?'circle':'rect';
  }
  update(){
    this.y-=this.speed; this.x+=this.dx; this.rot+=this.rotS; this.life++;
    const p=this.life/this.maxLife;
    this.op = p<0.1?(p/0.1)*this.maxOp:p>0.85?((1-p)/0.15)*this.maxOp:this.maxOp;
    return this.life<this.maxLife;
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.op;ctx.fillStyle=this.col;
    ctx.translate(this.x,this.y);ctx.rotate(this.rot*Math.PI/180);
    if(this.shape==='circle'){ctx.beginPath();ctx.arc(0,0,this.size/2,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(-this.size/2,-this.size/3,this.size,this.size*0.65);
    ctx.restore();
  }
}

function initParticles(t){
  particles=[];
  for(let i=0;i<45;i++){
    const p=new Particle(t);
    p.y=Math.random()*canvas.height;
    p.life=Math.floor(Math.random()*p.maxLife);
    particles.push(p);
  }
}

(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(Math.random()<0.14) particles.push(new Particle(activeTheme));
  particles=particles.filter(p=>{const a=p.update();if(a)p.draw();return a;});
  requestAnimationFrame(loop);
})();

// ── APPLY THEME ──
function applyTheme(t){
  activeTheme = t;
  document.body.style.background = t.bodyBg;
  card.style.background   = t.cardBg;
  card.style.border        = `2px solid ${t.cardBorder}`;
  card.style.borderRadius  = t.cardRadius;
  card.style.boxShadow     = t.cardShadow;
  card.style.transform     = t.cardTilt ? `rotate(${t.cardTilt}deg)` : 'rotate(0deg)';
  stripe.style.background  = t.stripe;
  stripe.style.backgroundSize = '300%';
  levelEl.style.background  = t.levelBg;
  levelEl.style.color       = t.levelColor;
  levelEl.style.border      = `1.5px solid ${t.levelBorder}`;
  cBox.style.background     = t.cipherBg;
  cBox.style.borderColor    = t.cipherBorder;
  cText.style.color         = t.cipherColor;
  cText.style.fontFamily    = t.cipherFont;
  cText.style.fontSize      = t.cipherSize;
  btn.style.background      = t.btnBg;
  btn.style.color           = t.btnColor;
  btn.style.boxShadow       = t.btnShadow;
  btn.style.borderRadius    = t.btnRadius;
  progBgEl.style.background = t.progBg;
  progFill.style.background = t.progFill;
  progLabel.style.color     = t.progLabel;
  banner.style.background   = t.bannerBg;
  banner.style.color        = t.bannerColor;
  corners.forEach((c,i)=>{c.textContent=t.corners[i]||'✨';});
  gifFrame.style.borderRadius = t.gifRadius;
  gifFrame.style.border     = `3px solid ${t.cardBorder}`;
  gifFrame.style.boxShadow  = `0 4px 24px ${t.particleCols[0]}88`;
  initParticles(t);
}

// ── PORTAL ──
function triggerPortal(t, cb){
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  portal.style.cssText=`position:fixed;left:${cx-50}px;top:${cy-50}px;width:100px;height:100px;border-radius:50%;background:${t.portalCol};z-index:500;pointer-events:none;`;
  portal.classList.remove('active');
  void portal.offsetWidth;
  portal.classList.add('active');
  setTimeout(cb, 190);
}

// ── BANNER ──
function flashBanner(t, idx){
  banner.textContent = t.name + '  ·  stage '+(idx+1);
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 1900);
}

// ── LOAD SLIDE ──
function loadSlide(idx){
  const s=slides[idx], t=THEMES[themeIdx];
  mainGif.classList.add('out');
  cBox.classList.add('out');
  setTimeout(()=>{
    mainGif.src = s.gif;
    cText.textContent = s.text;
    stks.forEach((el,i)=>el.textContent=s.stk[i]);
    levelEl.textContent='stage '+String(idx+1).padStart(2,'0')+' / '+String(N).padStart(2,'0');
    btn.innerHTML = s.final ? '🌷 db dpha 🌷' : 'nrjv &#8594;';
    progFill.style.width = ((idx+1)/N*100).toFixed(1)+'%';
    progLabel.textContent = `stage ${idx+1} / ${N}  ·  ${t.labelText} world`;
    mainGif.classList.remove('out');
    cBox.classList.remove('out');
    if(s.final) spawnConfetti();
    isAnimating=false;
  },350);
}

// ── NEXT ──
function next(){
  if(isAnimating) return;
  isAnimating=true;
  spawnSparks();
  let n;
  do{n=Math.floor(Math.random()*THEMES.length);}while(n===themeIdx&&THEMES.length>1);
  themeIdx=n;
  const t=THEMES[themeIdx];
  triggerPortal(t,()=>{
    cur=cur<N-1?cur+1:0;
    applyTheme(t);
    flashBanner(t,cur);
    loadSlide(cur);
  });
}

// ── SPARKS ──
function spawnSparks(){
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const t=THEMES[themeIdx];
  const cols=[...t.particleCols,'#fff'];
  for(let i=0;i<20;i++){
    const sp=document.createElement('div');
    const a=Math.random()*360,d=50+Math.random()*70,sz=3+Math.random()*10,rad=a*Math.PI/180;
    sp.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'3px'};pointer-events:none;z-index:999;--dx:${Math.cos(rad)*d}px;--dy:${Math.sin(rad)*d}px;animation:spkOut .75s ease-out forwards;`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),900);
  }
}

// ── CONFETTI ──
function spawnConfetti(){
  const cols=['#f48fb1','#e91e8c','#ffd700','#c77dff','#00ffd5','#ff4db8','#ff6b35','#fff','#80ffd4'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      const sz=5+Math.random()*9,dur=2+Math.random()*2.5;
      c.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-10px;width:${sz}px;height:${sz*(.4+Math.random()*.8)}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;z-index:998;animation:confFall ${dur}s linear forwards;`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),(dur+.2)*1000);
    },i*40);
  }
}

// ── SWIPE ──
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{if(Math.abs(e.changedTouches[0].clientX-touchStartX)>55)next();},{passive:true});

// ── INIT ──
applyTheme(THEMES[0]);
loadSlide(0);
</script>
